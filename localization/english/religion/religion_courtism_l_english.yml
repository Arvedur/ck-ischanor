 #children_of_diena-Group Faiths
 courtism:0 "Court of Aldreda"
 courtism_adj:0 "Courtist"
 courtism_adherent:0 "Courtists"
 courtism_adherent_plural:0 "Courtists"
 courtism_desc:0 "Courtist worship Aldreda the creator and his court, whom he forgave after his physical form was destroyed during the Blinding. The court is made up of Aldreda
 The Creator Helia Regent of Aldreda, Goddess of the Sun, Light, the Past and the Present
 Horaios Regent of Aldreda, God of the Moon, Stars, Waters, and the Obscurity of the Future
 Hephus God of Knowledge Suzantha Goddess of Nature, Fertility, Agriculture, and the Natural; Ruhric God of the Arts and Trickery; Loros God of Commerce and tradewinds Manos God of War, Strength, and Honor Daudin God of Decay, Aging, and Lost Souls Thuggius God of Heroes, Brutality, and Chaos Macelanor God of Justice, Order, and Peace Valles the God of Chance, Luck, Comedy, and the Gamble. They also worship Ascendants. Ascendants are deities that are not in the court of Aldreda, and generally came after the blinding. Often, they are the creation or offspring of a member of the court, such as Lady Celras protector of celras, Flux Arasi protector of ischanor and emperors, Suzhelda nature spirits and Varosos god of alcohol"

