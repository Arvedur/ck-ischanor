 měcynec_courtism_desc:0 "Courtist worship Aldreda the creator and his court, whom he forgave after his physical form was destroyed during the Blinding. The Měcynec branch belives many of the same things as the origional courtist branch however varies slightly over specific belifes choosing to to belive in the Ascendants."