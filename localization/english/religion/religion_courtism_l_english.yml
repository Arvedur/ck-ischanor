 courtism_religion_desc:0 "In the beginning, the only thing that existed was Aldreda. Aldreda was the sole something in nothing. However, Aldreda desired to create, and so he took parts of himself to create. He made the stars, moons, planets, comets, suns, and many other parts of the night, and he felt fulfilled. And so he took a divine slumber. When he woke up, he saw something out of place. A small, rocky planet that he created first floated through the void of night. Aldreda, however, felt pity for the small planet and decided he wanted to save it and to give the planet a part of himself. And so he went about giving the planet life. Before he divined man, he first shaped the rocks to form mountains and valleys and oceans and lakes and rivers. Then, he created two twins to look over the small planet, Helia, the sun, and Horios, the moon. Then Aldreda took a part of himself to create the plants, the animals, and finally, man."
