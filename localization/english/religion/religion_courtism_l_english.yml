 courtism:0 "Courtism"
 courtism_adj:0 "Courtist"
 courtism_adherent:0 "Courtists"
 courtism_adherent_plural:0 "Courtists"
 courtism_desc:0 "The Courtist Church is the amalgamation of a number of local cults & folk beliefs that worshipped a number of gods. The Church believes in a pantheon of gods headed Aldreda. After a number of consolidations, the Courtist Church now believes that the Arcierio is the supreme head of the Church & representative of the gods."
